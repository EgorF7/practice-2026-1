    <meta charset="UTF-8">
    <title>Ресурсы - Проектная деятельность</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ccc;
        }

        nav a {
            display: inline-block;
            text-decoration: none;
            background-color: #e0e0e0;
            color: #1a1a1a;
            padding: 8px 16px;
            border-radius: 0px;
            font-weight: normal;
            transition: background-color 0.2s;
        }

        nav a:hover {
            background-color: #c0c0c0;
        }

        h1 {
            font-size: 28px;
            margin-top: 20px;
            margin-bottom: 15px;
            color: #222;
        }

        h1::before {
            content: "— ";
        }

        h2 {
            font-size: 22px;
            margin-top: 25px;
            margin-bottom: 10px;
            color: #333;
        }

        .divider {
            margin: 30px 0;
            border-top: 1px solid #ccc;
        }

        p {
            margin-bottom: 12px;
        }

        ul {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        li {
            margin-bottom: 6px;
        }

        a:not(nav a) {
            color: #1a5f7a;
            text-decoration: none;
            border-bottom: 1px dotted #1a5f7a;
        }

        a:not(nav a):hover {
            color: #0d3b4d;
            border-bottom-style: solid;
        }
    </style>
</head>
